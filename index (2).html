<!doctype html>
<html lang="en-AU">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BKI Activity Builder</title>
<style>
  :root { --blue:#1a4b8c; --ink:#1f2733; --line:#d8dee8; --bg:#f4f6fa; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; color:var(--ink); background:var(--bg); }
  header { background:var(--blue); color:#fff; padding:1rem 1.25rem; }
  header h1 { margin:0; font-size:1.2rem; }
  header p { margin:.3rem 0 0; font-size:.85rem; opacity:.92; }
  .tabs { display:flex; flex-wrap:wrap; gap:.4rem; padding:.75rem 1.25rem 0; }
  .tab { background:#e7ecf4; border:1px solid var(--line); border-bottom:none; border-radius:.4rem .4rem 0 0; padding:.45rem .9rem; font-size:.85rem; font-weight:600; cursor:pointer; color:var(--blue); }
  .tab[aria-selected="true"] { background:#fff; color:var(--ink); }
  .wrap { display:flex; gap:1rem; padding:1rem 1.25rem 2rem; align-items:flex-start; }
  .panel { background:#fff; border:1px solid var(--line); border-radius:.5rem; padding:1rem 1.1rem; flex:1 1 420px; min-width:300px; }
  .panel h2 { margin:0 0 .75rem; font-size:.95rem; color:var(--blue); }
  label.fld { display:block; font-size:.8rem; font-weight:600; margin:.7rem 0 .25rem; }
  input[type=text], textarea { width:100%; padding:.5rem .6rem; border:1px solid var(--line); border-radius:.35rem; font-size:.9rem; font-family:inherit; }
  textarea { min-height:5rem; resize:vertical; line-height:1.45; }
  .hint { font-size:.74rem; color:#5a6472; margin:.2rem 0 0; }
  .opt-row, .scn { border:1px solid var(--line); border-radius:.4rem; padding:.6rem .7rem; margin:.5rem 0; background:#fafbfd; }
  .opt-row .top { display:flex; align-items:center; gap:.6rem; }
  .opt-row input[type=text] { flex:1; }
  .chk { font-size:.78rem; display:flex; align-items:center; gap:.3rem; white-space:nowrap; }
  .btn { background:var(--blue); color:#fff; border:none; border-radius:.35rem; padding:.5rem 1rem; font-size:.85rem; font-weight:600; cursor:pointer; }
  .btn.ghost { background:#fff; color:var(--blue); border:1px solid var(--blue); }
  .btn.sm { padding:.3rem .65rem; font-size:.78rem; }
  .btn.danger { background:#fff; color:#b3261e; border:1px solid #e3b6b2; }
  .row-actions { display:flex; gap:.5rem; flex-wrap:wrap; margin-top:.5rem; }
  .bar { display:flex; gap:.5rem; flex-wrap:wrap; margin:1rem 0 .5rem; }
  .report { font-size:.8rem; border-radius:.4rem; padding:.55rem .7rem; margin:.5rem 0; border:1px solid; }
  .report.ok { background:#e7f6ec; border-color:#acd8b8; color:#14532d; }
  .report.warn { background:#fdeceb; border-color:#e9b9b4; color:#7a1d16; }
  .report.info { background:#eef3fb; border-color:#c2d3ee; color:#1a3a66; }
  .report b { font-weight:700; }
  .out { width:100%; min-height:11rem; font-family:ui-monospace,Consolas,Menlo,monospace; font-size:.78rem; white-space:pre; overflow:auto; }
  iframe.preview { width:100%; min-height:340px; border:1px solid var(--line); border-radius:.4rem; background:#fff; }
  .muted { color:#5a6472; font-size:.78rem; }
  @media (max-width:880px){ .wrap{ flex-direction:column; } }
</style>
</head>
<body>
<header>
  <h1>BKI Activity Builder</h1>
  <p>Fill in the fields, generate clean Moodle-paste-ready markup, then paste it into the source view of your page or chapter and save. Smart quotes and dashes are cleaned automatically.</p>
</header>

<div class="tabs" id="tabs" role="tablist"></div>

<div class="wrap">
  <section class="panel" aria-label="Activity fields">
    <h2 id="formTitle">Activity fields</h2>
    <div id="form"></div>
    <div class="bar">
      <button class="btn" id="genBtn">Generate markup</button>
    </div>
  </section>

  <section class="panel" aria-label="Output and preview">
    <h2>Output</h2>
    <div id="report"></div>
    <textarea class="out" id="out" readonly placeholder="Your generated markup appears here. Select Generate markup."></textarea>
    <div class="bar">
      <button class="btn" id="copyBtn">Copy to clipboard</button>
      <button class="btn ghost" id="dlBtn">Download .html</button>
    </div>
    <h2 style="margin-top:1rem;">Live preview <span class="muted">(interactive)</span></h2>
    <iframe class="preview" id="preview" title="Activity preview"></iframe>
  </section>
</div>

<script>
/* ---------- shared helpers ---------- */
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function attr(s){ return esc(s).replace(/"/g,'&quot;'); }
function uid(){ return Math.random().toString(36).slice(2,8); }

/* The sanitiser: normalise Word junk to rule-compliant characters.
   Targets ONLY smart quotes, dashes, non-breaking spaces and ellipsis.
   Leaves multiplication, division and squared symbols and emoji alone. */
function scrub(raw){
  var s = String(raw == null ? '' : raw);
  s = s.replace(/[\u201C\u201D\u201E\u201F\u2033\u2036]/g, '"');     // smart double quotes
  s = s.replace(/[\u2018\u2019\u201A\u201B\u2032\u2035]/g, "'");     // smart single quotes
  s = s.replace(/(\d)\s*[\u2012\u2013\u2014\u2015]\s*(\d)/g, '$1 to $2'); // numeric ranges
  s = s.replace(/[\u2012\u2013\u2014\u2015\u2212]/g, '-');           // any remaining dash to hyphen
  s = s.replace(/[\u00A0\u2007\u202F\u2009\u2002\u2003]/g, ' ');     // odd spaces to normal space
  s = s.replace(/\u2026/g, '...');                                   // ellipsis
  s = s.replace(/[ \t]+/g, ' ');                                     // collapse runs of spaces/tabs
  s = s.replace(/[ \t]+\n/g, '\n').replace(/\n[ \t]+/g, '\n');       // tidy line edges, keep newlines
  return s.trim();
}

/* Count what the sanitiser would change, for the report. */
function junkReport(texts){
  var joined = texts.join('\n');
  return {
    sq: (joined.match(/[\u2018\u2019\u201C\u201D\u201A\u201B\u201E\u201F\u2032\u2033\u2035\u2036]/g)||[]).length,
    dash: (joined.match(/[\u2012\u2013\u2014\u2015\u2212]/g)||[]).length,
    nbsp: (joined.match(/[\u00A0\u2007\u202F]/g)||[]).length,
    ell: (joined.match(/\u2026/g)||[]).length
  };
}

function val(id){ var el=document.getElementById(id); return el?el.value:''; }
function add(parent, html){ var d=document.createElement('div'); d.innerHTML=html; while(d.firstChild) parent.appendChild(d.firstChild); }

var BLUE='#1a4b8c', GREEN='#2e7d32', GREENBG='#eef6ef';

/* ---------- generated activity scripts (closing tag escaped so this page parses) ---------- */
var MCQ_SCRIPT = `<script>
(function() {
  function initMCQ() {
    var groups = document.querySelectorAll('.mcq-group');
    groups.forEach(function(group) {
      if (group.getAttribute('data-mcq-init') === 'true') return;
      group.setAttribute('data-mcq-init', 'true');
      var button = group.querySelector('.mcq-check-btn');
      if (!button) return;
      button.addEventListener('click', function() {
        var required = parseInt(group.getAttribute('data-required'), 10) || 1;
        var labels = group.querySelectorAll('label[data-correct]');
        var correct = 0, incorrect = 0;
        labels.forEach(function(label) {
          var cb = label.querySelector('input[type="checkbox"]');
          if (cb && cb.checked) {
            if (label.getAttribute('data-correct') === 'true') correct++; else incorrect++;
          }
        });
        var ok = correct === required && incorrect === 0;
        var cm = group.querySelector('.mcq-correct');
        var im = group.querySelector('.mcq-incorrect');
        if (cm) cm.style.display = ok ? 'block' : 'none';
        if (im) im.style.display = ok ? 'none' : 'block';
      });
    });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initMCQ);
  else initMCQ();
})();
<\/script>`;

var SR_SCRIPT = `<script>
(function() {
  function initCarousel() {
    var cars = document.querySelectorAll('.sr-carousel');
    cars.forEach(function(car) {
      if (car.getAttribute('data-sr-init') === 'true') return;
      car.setAttribute('data-sr-init', 'true');
      var slides = car.querySelectorAll('.sr-slide');
      var prev = car.querySelector('.sr-prev');
      var next = car.querySelector('.sr-next');
      var counter = car.querySelector('.sr-counter');
      var dots = car.querySelectorAll('.sr-dot');
      var idx = 0;
      function setDisabled(btn, st){ if(!btn) return; btn.disabled=st; btn.style.opacity=st?'0.4':'1'; btn.style.cursor=st?'default':'pointer'; }
      function show(i){
        idx=i;
        slides.forEach(function(s,n){ s.style.display=(n===i)?'block':'none'; s.setAttribute('aria-hidden',(n===i)?'false':'true'); });
        dots.forEach(function(d,n){ var on=(n===i); d.style.background=on?'#1a4b8c':'#cdd5e0'; if(on) d.setAttribute('aria-current','true'); else d.removeAttribute('aria-current'); });
        if(counter) counter.textContent='Scenario '+(i+1)+' of '+slides.length;
        setDisabled(prev,i===0); setDisabled(next,i===slides.length-1);
      }
      if(prev) prev.addEventListener('click', function(){ if(idx>0) show(idx-1); });
      if(next) next.addEventListener('click', function(){ if(idx<slides.length-1) show(idx+1); });
      dots.forEach(function(d){ d.addEventListener('click', function(){ show(parseInt(d.getAttribute('data-idx'),10)); }); });
      var btns = car.querySelectorAll('.sr-btn');
      btns.forEach(function(btn){
        btn.addEventListener('click', function(){
          var slide=btn.closest('.sr-slide'); var ans=slide.querySelector('.sr-answer');
          var open=ans.style.display==='block';
          ans.style.display=open?'none':'block';
          btn.setAttribute('aria-expanded',open?'false':'true');
          btn.textContent=open?'Reveal answer':'Hide answer';
        });
        btn.addEventListener('focus', function(){ btn.style.outline='3px solid #1a4b8c'; btn.style.outlineOffset='2px'; });
        btn.addEventListener('blur', function(){ btn.style.outline=''; btn.style.outlineOffset=''; });
      });
      show(0);
    });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initCarousel);
  else initCarousel();
})();
<\/script>`;

var FC_SCRIPT = `<script>
(function() {
  function initFlashcards() {
    var cards = document.querySelectorAll('.flashcard');
    cards.forEach(function(card) {
      if (card.getAttribute('data-fc-init') === 'true') return;
      card.setAttribute('data-fc-init', 'true');
      card.addEventListener('click', function() {
        var flipped = card.getAttribute('aria-pressed') === 'true';
        card.setAttribute('aria-pressed', flipped ? 'false' : 'true');
        var front = card.querySelector('.fc-front');
        var back = card.querySelector('.fc-back');
        var inner = card.querySelector('.fc-inner');
        if (front) front.setAttribute('aria-hidden', flipped ? 'false' : 'true');
        if (back) back.setAttribute('aria-hidden', flipped ? 'true' : 'false');
        if (inner) inner.style.transform = flipped ? 'rotateY(0deg)' : 'rotateY(180deg)';
      });
    });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initFlashcards);
  else initFlashcards();
})();
<\/script>`;

var WR_SCRIPT = `<script>
(function() {
  function initWR() {
    var blocks = document.querySelectorAll('.wr-block');
    blocks.forEach(function(block) {
      if (block.getAttribute('data-wr-init') === 'true') return;
      block.setAttribute('data-wr-init', 'true');
      var btn = block.querySelector('.wr-reveal-btn');
      var panel = block.querySelector('.wr-suggested');
      if (!btn || !panel) return;
      btn.addEventListener('click', function() {
        var open = btn.getAttribute('aria-expanded') === 'true';
        btn.setAttribute('aria-expanded', open ? 'false' : 'true');
        panel.style.display = open ? 'none' : 'block';
        btn.textContent = open ? 'Show suggested answers' : 'Hide suggested answers';
      });
      btn.addEventListener('focus', function() { btn.style.outline = '3px solid #1a4b8c'; btn.style.outlineOffset = '2px'; });
      btn.addEventListener('blur', function() { btn.style.outline = ''; btn.style.outlineOffset = ''; });
    });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initWR);
  else initWR();
})();
<\/script>`;

var FLOW_SCRIPT = `<script>
(function() {
  function initFlowchart() {
    var trees = document.querySelectorAll('.fc-tree');
    trees.forEach(function(tree) {
      if (tree.getAttribute('data-flow-init') === 'true') return;
      tree.setAttribute('data-flow-init', 'true');
      var buttonsGroup = tree.querySelector('.fc-buttons');
      var yesPath = tree.querySelector('.fc-yes-path');
      var noPath = tree.querySelector('.fc-no-path');
      var yesBtn = tree.querySelector('.fc-btn-yes');
      var noBtn = tree.querySelector('.fc-btn-no');
      var resetBtns = tree.querySelectorAll('.fc-btn-reset');
      if (yesBtn) yesBtn.addEventListener('click', function() { buttonsGroup.style.display = 'none'; if (yesPath) yesPath.style.display = 'block'; if (noPath) noPath.style.display = 'none'; });
      if (noBtn) noBtn.addEventListener('click', function() { buttonsGroup.style.display = 'none'; if (yesPath) yesPath.style.display = 'none'; if (noPath) noPath.style.display = 'block'; });
      resetBtns.forEach(function(btn) { btn.addEventListener('click', function() { buttonsGroup.style.display = 'flex'; if (yesPath) yesPath.style.display = 'none'; if (noPath) noPath.style.display = 'none'; }); });
    });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initFlowchart);
  else initFlowchart();
})();
<\/script>`;

var DD_SCRIPT = `<script>
(function() {
  function initDragDrop() {
    var blocks = document.querySelectorAll('.dd-block');
    blocks.forEach(function(block) {
      if (block.getAttribute('data-dd-init') === 'true') return;
      block.setAttribute('data-dd-init', 'true');
      var pool = block.querySelector('.dd-pool');
      var buckets = block.querySelectorAll('.dd-bucket');
      var feedback = block.querySelector('.dd-feedback');
      var live = block.querySelector('.dd-live');
      var checkBtn = block.querySelector('.dd-check');
      var resetBtn = block.querySelector('.dd-reset');
      var pickedUp = null;
      function announce(msg) { live.textContent = msg; }
      function clearFeedback() {
        feedback.style.display = 'none';
        block.querySelectorAll('.dd-item').forEach(function(item) { item.style.borderColor = '#1a4b8c'; item.style.background = '#fff'; });
      }
      function cancelPickup() {
        if (pickedUp) { pickedUp.style.background = '#fff'; pickedUp.style.color = '#0e2b3c'; pickedUp.style.transform = ''; announce('Pickup cancelled'); pickedUp = null; }
      }
      function pickUp(item) {
        if (pickedUp) cancelPickup();
        pickedUp = item; item.style.background = '#1a4b8c'; item.style.color = '#fff'; item.style.transform = 'translateY(-2px)';
        announce(item.textContent + ' picked up. Tab to a bucket and press Space to drop, or press Escape to cancel.');
      }
      block.addEventListener('dragstart', function(e) {
        var item = e.target.closest('.dd-item'); if (!item) return;
        e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', 'dragging');
        item.setAttribute('data-dragging', 'true'); item.style.opacity = '0.45';
      });
      block.addEventListener('dragend', function(e) {
        var item = e.target.closest('.dd-item'); if (item) { item.removeAttribute('data-dragging'); item.style.opacity = ''; }
      });
      buckets.forEach(function(bucket) {
        bucket.addEventListener('dragover', function(e) { e.preventDefault(); bucket.style.borderColor = '#1a4b8c'; bucket.style.background = '#eef4fb'; });
        bucket.addEventListener('dragleave', function() { bucket.style.borderColor = '#cbd5e1'; bucket.style.background = '#f8fafc'; });
        bucket.addEventListener('drop', function(e) {
          e.preventDefault(); bucket.style.borderColor = '#cbd5e1'; bucket.style.background = '#f8fafc';
          var dragging = block.querySelector('[data-dragging="true"]');
          if (dragging) { bucket.appendChild(dragging); announce(dragging.textContent + ' dropped into ' + bucket.querySelector('h4').textContent); clearFeedback(); }
        });
        bucket.addEventListener('keydown', function(e) {
          if (pickedUp && (e.key === ' ' || e.key === 'Enter')) {
            e.preventDefault(); bucket.appendChild(pickedUp); announce(pickedUp.textContent + ' dropped into ' + bucket.querySelector('h4').textContent);
            pickedUp.style.background = '#fff'; pickedUp.style.color = '#0e2b3c'; pickedUp.style.transform = ''; pickedUp = null; clearFeedback();
          } else if (e.key === 'Escape') { cancelPickup(); }
        });
      });
      pool.addEventListener('dragover', function(e) { e.preventDefault(); });
      pool.addEventListener('drop', function(e) {
        e.preventDefault(); var dragging = block.querySelector('[data-dragging="true"]');
        if (dragging) { pool.appendChild(dragging); announce(dragging.textContent + ' returned to items list'); clearFeedback(); }
      });
      block.addEventListener('keydown', function(e) {
        var item = e.target.closest('.dd-item');
        if (item) {
          if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); if (pickedUp === item) cancelPickup(); else pickUp(item); }
          else if (e.key === 'Escape') { cancelPickup(); }
        }
      });
      checkBtn.addEventListener('click', function() {
        var items = block.querySelectorAll('.dd-item'); var allSorted = true; var correctCount = 0; var totalCount = items.length;
        items.forEach(function(item) {
          if (item.closest('.dd-pool')) { allSorted = false; return; }
          var bucket = item.closest('.dd-bucket');
          if (bucket.getAttribute('data-category') === item.getAttribute('data-correct')) { item.style.borderColor = '#2e7d32'; item.style.background = '#f0fdf4'; correctCount++; }
          else { item.style.borderColor = '#c0392b'; item.style.background = '#fef2f2'; }
        });
        if (!allSorted) {
          feedback.setAttribute('style', 'display:block; margin-top:1rem; padding:.85rem 1.1rem; border-radius:.4rem; font-size:.9rem; background:#fee2e2; color:#7f1d1d; border-left:4px solid #c0392b;');
          feedback.innerHTML = '<strong>Not yet.</strong> Sort all items into a bucket before checking your answers.'; announce('Not all items sorted yet.'); return;
        }
        if (correctCount === totalCount) {
          feedback.setAttribute('style', 'display:block; margin-top:1rem; padding:.85rem 1.1rem; border-radius:.4rem; font-size:.9rem; background:#d1fae5; color:#064e3b; border-left:4px solid #2e7d32;');
          feedback.innerHTML = '<strong>&#10003; All correct.</strong> ' + (block.getAttribute('data-correct-msg') || ''); announce('All items sorted correctly.');
        } else {
          feedback.setAttribute('style', 'display:block; margin-top:1rem; padding:.85rem 1.1rem; border-radius:.4rem; font-size:.9rem; background:#fef9c3; color:#713f12; border-left:4px solid #ca8a04;');
          feedback.innerHTML = '<strong>You got ' + correctCount + ' out of ' + totalCount + ' right.</strong> Incorrect items are outlined in red. Move them to the other bucket and check again.'; announce(correctCount + ' out of ' + totalCount + ' correct.');
        }
      });
      resetBtn.addEventListener('click', function() {
        block.querySelectorAll('.dd-item').forEach(function(item) { item.style.borderColor = '#1a4b8c'; item.style.background = '#fff'; item.style.color = '#0e2b3c'; item.style.transform = ''; pool.appendChild(item); });
        pickedUp = null; feedback.style.display = 'none'; announce('Activity reset. All items returned to the items list.');
      });
    });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initDragDrop);
  else initDragDrop();
})();
<\/script>`;

var TS_SCRIPT = `<script>
(function() {
  function initTapSort() {
    var blocks = document.querySelectorAll('.ts-block');
    blocks.forEach(function(block) {
      if (block.getAttribute('data-ts-init') === 'true') return;
      block.setAttribute('data-ts-init', 'true');
      var pool = block.querySelector('.ts-pool');
      var feedback = block.querySelector('.ts-feedback');
      var c1key = block.getAttribute('data-c1-key');
      var c2key = block.getAttribute('data-c2-key');
      var c1label = block.getAttribute('data-c1-label');
      var c2label = block.getAttribute('data-c2-label');
      var b1 = block.querySelector('.ts-bucket[data-category="' + c1key + '"] .ts-bucket-items');
      var b2 = block.querySelector('.ts-bucket[data-category="' + c2key + '"] .ts-bucket-items');
      var checkBtn = block.querySelector('.ts-check');
      var resetBtn = block.querySelector('.ts-reset');
      function updateBucketEmpty(bucketItems) {
        var hasItems = bucketItems.querySelector('.ts-item');
        var empty = bucketItems.querySelector('.ts-bucket-empty');
        if (hasItems && empty) empty.remove();
        if (!hasItems && !empty) {
          var msg = document.createElement('div');
          msg.className = 'ts-bucket-empty';
          msg.setAttribute('style', 'color:#94a3b8; font-size:.8rem; font-style:italic; text-align:center; padding:1rem 0;');
          msg.textContent = 'Nothing placed here yet';
          bucketItems.appendChild(msg);
        }
      }
      function clearFeedback() {
        feedback.style.display = 'none';
        block.querySelectorAll('.ts-item').forEach(function(item) { item.style.borderColor = '#e2e8f0'; item.style.background = '#fff'; });
      }
      function abtn(key, label) {
        return '<button type="button" class="ts-assign" data-target="' + key + '" aria-label="Sort as ' + label + '" style="background:#fff; border:1px solid #1a4b8c; color:#1a4b8c; padding:.35rem .8rem; font-size:.82rem; font-weight:600; border-radius:.35rem; cursor:pointer; font-family:inherit;">' + label + '</button>';
      }
      function makeAssignButtons() { return abtn(c1key, c1label) + abtn(c2key, c2label); }
      function makeRemoveButton(itemText) {
        var safe = itemText.replace(/"/g, '&quot;');
        return '<button type="button" class="ts-remove" aria-label="Remove ' + safe + ' from this bucket" style="background:transparent; border:none; color:#64748b; padding:.25rem .5rem; font-size:1rem; cursor:pointer; border-radius:.3rem; line-height:1; font-family:inherit;">&times;</button>';
      }
      block.addEventListener('click', function(e) {
        var assignBtn = e.target.closest('.ts-assign');
        var removeBtn = e.target.closest('.ts-remove');
        if (assignBtn) {
          var item = assignBtn.closest('.ts-item');
          var category = assignBtn.getAttribute('data-target');
          item.querySelector('.ts-actions').innerHTML = makeRemoveButton(item.querySelector('.ts-item-text').textContent);
          var target = category === c1key ? b1 : b2;
          target.appendChild(item);
          updateBucketEmpty(b1); updateBucketEmpty(b2); clearFeedback();
        } else if (removeBtn) {
          var rItem = removeBtn.closest('.ts-item');
          rItem.querySelector('.ts-actions').innerHTML = makeAssignButtons();
          rItem.style.borderColor = '#e2e8f0'; rItem.style.background = '#fff';
          pool.appendChild(rItem);
          updateBucketEmpty(b1); updateBucketEmpty(b2); clearFeedback();
        }
      });
      checkBtn.addEventListener('click', function() {
        var items = block.querySelectorAll('.ts-item'); var allSorted = true; var correctCount = 0; var totalCount = items.length;
        items.forEach(function(item) {
          var parent = item.closest('.ts-bucket-items, .ts-pool');
          if (parent === pool) { allSorted = false; return; }
          var bucket = item.closest('.ts-bucket');
          if (bucket.getAttribute('data-category') === item.getAttribute('data-correct')) { item.style.borderColor = '#2e7d32'; item.style.background = '#f0fdf4'; correctCount++; }
          else { item.style.borderColor = '#c0392b'; item.style.background = '#fef2f2'; }
        });
        if (!allSorted) {

/* ---------- answer mini-parser for scenario reveal ----------
   Blank line separates blocks.
   "- " line  -> bullet list item (consecutive grouped)
   "= " line  -> calculation line, monospace box (consecutive grouped)
   line starting with a lightbulb, or "tip:" -> highlighted tip
   anything else -> paragraph                                            */
function parseAnswer(raw){
  var lines = scrub(raw).split(/\n/);
  var blocks=[], buf=null, bufType=null;
  function flush(){ if(buf){ blocks.push([bufType,buf]); buf=null; bufType=null; } }
  lines.forEach(function(ln){
    var t=ln.trim();
    if(t===''){ flush(); return; }
    if(t.indexOf('- ')===0){ if(bufType!=='ul'){ flush(); buf=[]; bufType='ul'; } buf.push(t.slice(2).trim()); }
    else if(t.indexOf('= ')===0){ if(bufType!=='calc'){ flush(); buf=[]; bufType='calc'; } buf.push(t.slice(2).trim()); }
    else if(t.charAt(0)==='\uD83D' || t.toLowerCase().indexOf('tip:')===0){
      flush();
      var txt = t.toLowerCase().indexOf('tip:')===0 ? ('\uD83D\uDCA1 '+t.slice(4).trim()) : t;
      blocks.push(['tip',txt]);
    }
    else { flush(); blocks.push(['p',t]); }
  });
  flush();
  return blocks;
}
function renderAnswer(blocks){
  return blocks.map(function(b){
    var t=b[0], v=b[1];
    if(t==='p') return '<p style="margin:0 0 .55rem;">'+esc(v)+'</p>';
    if(t==='tip') return '<p style="margin:.4rem 0 0; padding-top:.5rem; border-top:1px solid #d4e0d4;">'+esc(v)+'</p>';
    if(t==='ul') return '<ul style="margin:0 0 .55rem; padding-left:1.2rem;">'+v.map(function(x){return '<li style="margin-bottom:.2rem;">'+esc(x)+'</li>';}).join('')+'</ul>';
    if(t==='calc') return '<div style="background:#fff; border:1px solid #d4e0d4; border-radius:.3rem; padding:.6rem .7rem; margin:0 0 .55rem; overflow-wrap:break-word;">'+v.map(function(x){return '<p style="margin:0 0 .25rem; font-family:\'Courier New\',monospace; font-size:.88rem;">'+esc(x)+'</p>';}).join('')+'</div>';
    return '';
  }).join('');
}

  b.setAttribute('aria-selected', key===current?'true':'false');
  b.addEventListener('click', function(){ selectTab(key); });
  b.dataset.key=key;
  tabsEl.appendChild(b);
});

function selectTab(key){
  current=key;
  tabsEl.querySelectorAll('.tab').forEach(function(t){ t.setAttribute('aria-selected', t.dataset.key===key?'true':'false'); });
  document.getElementById('formTitle').textContent=ACTIVITIES[key].label+' fields';
  formEl.innerHTML='';
  ACTIVITIES[key].renderFields(formEl);
  outEl.value=''; reportEl.innerHTML='';
  previewEl.removeAttribute('srcdoc');
}

function residualCheck(markup){
  return {
    en: (markup.match(/\u2013/g)||[]).length,
    em: (markup.match(/\u2014/g)||[]).length,
    sq: (markup.match(/[\u2018\u2019\u201C\u201D]/g)||[]).length
  };
}

document.getElementById('genBtn').addEventListener('click', function(){
  var act=ACTIVITIES[current];
  var before=junkReport(act.rawTexts());
  var markup=act.build();
  outEl.value=markup;

  var msgs=[];
  if(before.sq||before.dash||before.nbsp||before.ell){
    var parts=[];
    if(before.sq) parts.push(before.sq+' smart quote'+(before.sq>1?'s':''));
    if(before.dash) parts.push(before.dash+' dash'+(before.dash>1?'es':''));
    if(before.nbsp) parts.push(before.nbsp+' non-breaking space'+(before.nbsp>1?'s':''));
    if(before.ell) parts.push(before.ell+' ellipsis');
    msgs.push('<div class="report info">Cleaned on the way through: <b>'+parts.join(', ')+'</b>.</div>');
  } else {
    msgs.push('<div class="report info">Input was already clean. Nothing to fix.</div>');
  }
  var r=residualCheck(markup);
  if(r.en||r.em||r.sq){
    msgs.push('<div class="report warn">Check failed: output still contains '+r.en+' en dash, '+r.em+' em dash, '+r.sq+' smart quote. Tell the builder maintainer.</div>');
  } else {
    msgs.push('<div class="report ok"><b>Output verified.</b> No en dashes, no em dashes, no smart quotes.</div>');
  }
  reportEl.innerHTML=msgs.join('');

  var doc='<!doctype html><html lang="en-AU"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">'+
    '<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.2/css/bootstrap.min.css">'+
    '<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">'+
    '<style>body{font-family:system-ui,Arial,sans-serif; margin:14px;} .well.card{padding:1rem; border:1px solid #e1e6ee; border-radius:.5rem;} .reflect-heading{color:#137a3f;}</style>'+
    '</head><body>'+markup+'</body></html>';
  previewEl.srcdoc=doc;
});

document.getElementById('copyBtn').addEventListener('click', function(){
  if(!outEl.value) return;
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(outEl.value).then(function(){ flash(this, 'Copied'); }.bind(this));
  } else {
    outEl.removeAttribute('readonly'); outEl.select();
    try{ document.execCommand('copy'); }catch(e){}
    outEl.setAttribute('readonly','');
  }
  var b=document.getElementById('copyBtn'); var old=b.textContent; b.textContent='Copied to clipboard'; setTimeout(function(){ b.textContent=old; },1400);
});

document.getElementById('dlBtn').addEventListener('click', function(){
  if(!outEl.value) return;
  var blob=new Blob([outEl.value], {type:'text/html'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=current+'_activity.html';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
});

selectTab('mcq');
</script>
</body>
</html>
